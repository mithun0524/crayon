name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # npm provenance

env:
  CI: "true"
  CRAYON_DISABLE_TELEMETRY: "1"

jobs:
  # ── Gate: nothing ships unless the full suite is green ────────────
  verify:
    name: Build and test everything
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(node -p "require('./packages/cli/package.json').version")
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag v$tag does not match packages/cli/package.json version $version"
            exit 1
          fi
      - run: pnpm -r run build
      - run: pnpm -r run typecheck
      - run: pnpm -r run test

  # ── Parallel packaging fan-out ────────────────────────────────────
  cli-binaries:
    name: CLI bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter "crayon-cli..." run build
      - name: Build standalone binaries
        working-directory: packages/cli
        run: pnpm run build:binaries
      - uses: actions/upload-artifact@v4
        with:
          name: crayon-cli-${{ matrix.os }}
          path: packages/cli/bin/*
          if-no-files-found: error

  vscode-extension:
    name: Package VS Code extension
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter "crayon-vscode..." run build
      - name: Package VSIX (staged, self-contained)
        run: pnpm --filter crayon-vscode run package
      - uses: actions/upload-artifact@v4
        with:
          name: crayon-vscode-vsix
          path: packages/vscode/*.vsix
          if-no-files-found: error

  # ── Publish to npm ────────────────────────────────────────────────
  # Publishes crayon-indexer, crayon-agent, crayon-cli in dependency
  # order; pnpm rewrites workspace:* to the real versions.
  npm-publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    needs: verify
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org
      - run: pnpm --filter "crayon-cli..." run build
      - name: Publish
        run: >
          pnpm --filter crayon-indexer --filter crayon-agent --filter crayon-cli
          publish --no-git-checks --provenance --report-summary
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub release with all assets ────────────────────────────────
  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [cli-binaries, vscode-extension]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*
